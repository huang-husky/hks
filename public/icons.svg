<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- 通用：所有线条图标统一采用琥珀主色 #c8a84b，警告色 #e05c2a -->

  <!-- 任务简报：盖有红章的档案 -->
  <symbol id="briefing-icon" viewBox="0 0 20 20">
    <path fill="none" stroke="#c8a84b" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.35"
      d="M4 2.5h8.5L16 6v11a1.5 1.5 0 0 1-1.5 1.5h-10A1.5 1.5 0 0 1 3 17V4a1.5 1.5 0 0 1 1-1.5z"/>
    <path fill="none" stroke="#c8a84b" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.35"
      d="M12 2.5V6h4M6 10h7M6 13h7M6 16h4"/>
    <circle cx="14" cy="15" r="2.6" fill="none" stroke="#e05c2a" stroke-width="1.1"/>
  </symbol>

  <!-- 证人：三位剪影 -->
  <symbol id="witness-icon" viewBox="0 0 20 20">
    <circle cx="10" cy="6.5" r="2.4" fill="none" stroke="#c8a84b" stroke-width="1.35"/>
    <path fill="none" stroke="#c8a84b" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.35"
      d="M5.5 16.5c0-2.5 2-4.2 4.5-4.2s4.5 1.7 4.5 4.2"/>
    <circle cx="3.5" cy="8" r="1.7" fill="none" stroke="#c8a84b" stroke-width="1.2" opacity="0.7"/>
    <circle cx="16.5" cy="8" r="1.7" fill="none" stroke="#c8a84b" stroke-width="1.2" opacity="0.7"/>
  </symbol>

  <!-- 飞机：B-17 俯视简化 -->
  <symbol id="plane-icon" viewBox="0 0 20 20">
    <path fill="#c8a84b" d="M9.4 2.2c0-.4.3-.7.6-.7s.6.3.6.7v6.2l7 2.2v1.6l-7-1.5v3.4l2 1.2v1.3l-3-.8-3 .8v-1.3l2-1.2v-3.4l-7 1.5V11l7-2.2z"/>
  </symbol>

  <!-- 弹孔：作为标记 / 列表点 -->
  <symbol id="bullet-hole-icon" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="5" fill="#e05c2a"/>
    <circle cx="10" cy="10" r="2.2" fill="#0a120a"/>
    <g stroke="#e05c2a" stroke-width="1" stroke-linecap="round" opacity="0.7">
      <path d="M10 3v2.5M10 14.5V17M3 10h2.5M14.5 10H17M5 5l1.8 1.8M13.2 13.2 15 15M15 5l-1.8 1.8M6.8 13.2 5 15"/>
    </g>
  </symbol>

  <!-- CLASSIFIED 印章 -->
  <symbol id="classified-icon" viewBox="0 0 20 20">
    <rect x="2" y="6" width="16" height="8" rx="0.8" fill="none" stroke="#e05c2a" stroke-width="1.4" transform="rotate(-6 10 10)"/>
    <rect x="3.5" y="7.5" width="13" height="5" fill="none" stroke="#e05c2a" stroke-width="0.6" transform="rotate(-6 10 10)" opacity="0.6"/>
    <path fill="#e05c2a" transform="rotate(-6 10 10)" d="M4.5 9.2h1.1l.5 1.5.5-1.5h1.1v2.6h-.7v-1.7l-.6 1.7h-.6l-.6-1.7v1.7h-.7zM8.6 9.2h2.1v.6H9.4v.4h1.2v.6H9.4v.4h1.4v.6H8.6zM11.2 9.2h2v.6h-1.3v.5h1.2v.6h-1.2v1h-.7zM13.7 9.2h.7v2h1.3v.6h-2z"/>
  </symbol>

  <!-- 判决：法槌 -->
  <symbol id="verdict-icon" viewBox="0 0 20 20">
    <path fill="none" stroke="#c8a84b" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.35"
      d="m4 16 7-7M9 5l6 6M7 3l4 4M13 7l4 4"/>
    <path fill="none" stroke="#c8a84b" stroke-linecap="round" stroke-width="1.35" d="M3 18h7"/>
  </symbol>

  <!-- GitHub（保留：作品仓库链接可能仍需要） -->
  <symbol id="github-icon" viewBox="0 0 19 19">
