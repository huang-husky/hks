<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- 军事档案底色 -->
  <rect width="64" height="64" rx="10" fill="#0a120a"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#c8a84b" stroke-width="0.6" stroke-dasharray="2 2" opacity="0.5"/>

  <!-- B-17 俯视轮廓 -->
  <g fill="#c8a84b">
    <!-- 机身 -->
    <path d="M30 8 Q32 5 34 8 L34 56 L30 56 Z"/>
    <!-- 主翼 -->
    <path d="M6 27 L58 27 L54 34 L10 34 Z"/>
    <!-- 平尾 -->
    <path d="M20 49 L44 49 L41 53 L23 53 Z"/>
    <!-- 垂尾 -->
    <path d="M30 52 L34 52 L33.2 60 L30.8 60 Z"/>
  </g>

  <!-- 发动机舱 -->
  <g fill="#0a120a" stroke="#c8a84b" stroke-width="1">
    <circle cx="16" cy="30.5" r="2.4"/>
    <circle cx="48" cy="30.5" r="2.4"/>
  </g>

  <!-- 弹孔：集中在翼面与机身（幸存者数据） -->
  <g fill="#e05c2a">
    <circle cx="13" cy="30" r="1.1"/>
    <circle cx="22" cy="31.5" r="0.9"/>
    <circle cx="26" cy="30.5" r="0.7"/>
    <circle cx="42" cy="31" r="0.9"/>
    <circle cx="51" cy="30" r="1"/>
    <circle cx="32" cy="42" r="1"/>
    <circle cx="32" cy="48" r="0.9"/>
    <circle cx="31" cy="20" r="0.7"/>
  </g>
</svg>
